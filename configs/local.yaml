# Local / free-first profile (default for reproduction)
embedding:
  backend: hash
  dim: 384

llm:
  backend: ollama  # optional: set base_url to empty to skip LLM judge (CAS falls back to VRP proxy)
  base_url: http://127.0.0.1:11434
  model: llama3.2:3b
  temperature: 0.1

chunking:
  max_words: 50
  overlap_words: 10

retrieval:
  top_k: 5
  hybrid_rrf_k: 60
  dense_weight: 0.5
  bm25_weight: 0.5

drift:
  cosine_threshold: 0.92
  use_deepdiff: false

seeds: [42, 43, 44, 45, 46]

bootstrap:
  n_resamples: 10000
  random_seed: 42

paths:
  data_dir: data
  corpus_v0_glob: corpus/v0/*.md
  corpus_v1_glob: corpus/v1/*.md
  queries: queries.jsonl
